name: ci
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify embedded assets
        run: test -s internal/assets/geosite.dat && test -s internal/assets/geoip.dat
      - run: go vet ./...
      - run: go build -trimpath -o irtrafficgen .
      - run: go test ./... -count=1
